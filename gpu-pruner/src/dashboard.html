<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Pruner Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            color: #333;
            font-size: 36px;
            font-weight: bold;
        }

        .stat-card.warning .stat-value {
            color: #f59e0b;
        }

        .workloads-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .workload-table {
            width: 100%;
            border-collapse: collapse;
        }

        .workload-table thead {
            background: #f9fafb;
        }

        .workload-table th {
            text-align: left;
            padding: 12px;
            color: #666;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .workload-table td {
            padding: 15px 12px;
            border-top: 1px solid #e5e7eb;
            color: #333;
        }

        .workload-table tbody tr:hover {
            background: #f9fafb;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.deployment {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge.statefulset {
            background: #fef3c7;
            color: #92400e;
        }

        .badge.replicaset {
            background: #ddd6fe;
            color: #5b21b6;
        }

        .badge.notebook {
            background: #fce7f3;
            color: #9f1239;
        }

        .badge.inferenceservice {
            background: #d1fae5;
            color: #065f46;
        }

        .namespace {
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .last-update {
            text-align: right;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GPU Pruner Dashboard</h1>
            <p>Monitor idle GPU workloads in the cluster</p>
        </div>

        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-label">Total Pods Checked</div>
                <div class="stat-value" id="total-pods">-</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">Idle Workloads</div>
                <div class="stat-value" id="idle-workloads">-</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">Wasted GPU Resources</div>
                <div class="stat-value" id="idle-gpus">-</div>
            </div>
        </div>

        <div class="workloads-section">
            <h2 class="section-title">Idle GPU Workloads</h2>
            <div id="workloads-content">
                <div class="loading">Loading...</div>
            </div>
            <div class="last-update" id="last-update"></div>
        </div>
    </div>

    <script>
        let refreshInterval;

        async function fetchData() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function updateDashboard(data) {
            document.getElementById('total-pods').textContent = data.total_pods_checked.toLocaleString();
            document.getElementById('idle-workloads').textContent = data.idle_workloads.length.toLocaleString();
            document.getElementById('idle-gpus').textContent = data.total_idle_gpus.toLocaleString();

            const workloadsContent = document.getElementById('workloads-content');

            if (data.idle_workloads.length === 0) {
                workloadsContent.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <h3>No Idle Workloads</h3>
                        <p>All GPU resources are being utilized efficiently!</p>
                    </div>
                `;
            } else {
                workloadsContent.innerHTML = `
                    <table class="workload-table">
                        <thead>
                            <tr>
                                <th>Namespace</th>
                                <th>Name</th>
                                <th>Type</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.idle_workloads.map(w => `
                                <tr>
                                    <td><span class="namespace">${w.namespace}</span></td>
                                    <td>${w.name}</td>
                                    <td><span class="badge ${w.kind.toLowerCase()}">${w.kind}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            const lastUpdate = new Date(data.last_update);
            document.getElementById('last-update').textContent =
                `Last updated: ${lastUpdate.toLocaleString()}`;
        }

        // Fetch data immediately and then every 10 seconds
        fetchData();
        refreshInterval = setInterval(fetchData, 10000);

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</body>
</html>

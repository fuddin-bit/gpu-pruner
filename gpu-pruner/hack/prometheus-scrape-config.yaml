# Example Prometheus scrape configurations for GPU monitoring infrastructure
#
# This file documents how to configure Prometheus to scrape the metrics that
# gpu-pruner consumes (DCGM exporter and kube-state-metrics).
#
# Note: These are likely already configured in your cluster if gpu-pruner is working,
# but this serves as a reference for new deployments.

---
# ServiceMonitor for NVIDIA DCGM Exporter
# The DCGM exporter typically runs as a DaemonSet on GPU nodes
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nvidia-dcgm-exporter
  namespace: gpu-operator  # or wherever DCGM exporter is deployed
  labels:
    app: nvidia-dcgm-exporter
spec:
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
  endpoints:
    - port: metrics  # typically port 9400
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      # Optional: relabeling to ensure pod/namespace labels are preserved
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: kubernetes_namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name

---
# ServiceMonitor for kube-state-metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-state-metrics
  namespace: kube-system  # or monitoring namespace
  labels:
    app: kube-state-metrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  endpoints:
    - port: http-metrics  # typically port 8080
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

---
# Alternative: PodMonitor for DCGM (if no Service exists)
# Use this if DCGM exporter DaemonSet doesn't have a Service
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: nvidia-dcgm-exporter
  namespace: gpu-operator
  labels:
    app: nvidia-dcgm-exporter
spec:
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

---

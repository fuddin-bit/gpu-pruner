---
# Notes:
#
# 1. DCGM Exporter typically exposes these key metrics:
#    - DCGM_FI_PROF_GR_ENGINE_ACTIVE (primary idle detection metric)
#    - DCGM_FI_DEV_GPU_UTIL (fallback utilization metric)
#    - DCGM_FI_DEV_FB_USED / DCGM_FI_DEV_FB_TOTAL (memory metrics)
#    - DCGM_FI_DEV_POWER_USAGE (power draw)
#
# 2. kube-state-metrics provides:
#    - kube_pod_container_resource_requests{resource="nvidia_com_gpu"}
#
# 3. Verify scraping is working:
#    kubectl port-forward -n <prometheus-namespace> svc/prometheus-k8s 9090:9090
#    Open http://localhost:9090/targets
#    Look for dcgm-exporter and kube-state-metrics targets showing as UP
#
# 4. Test queries in Prometheus:
#    count(DCGM_FI_DEV_GPU_UTIL)  # Should return total GPU count
#    count(max_over_time(DCGM_FI_PROF_GR_ENGINE_ACTIVE[30m]) == 0)  # Idle GPUs

# Public LoadBalancer for the gpu-pruner web dashboard (port 8080).
apiVersion: v1
kind: Service
metadata:
  name: gpu-pruner-web
  namespace: gpu-pruner-system
  labels:
    app: gpu-pruner
  annotations:
    service.beta.kubernetes.io/coreweave-load-balancer-type: "public"
    service.beta.kubernetes.io/external-hostname: "gpu-pruner-dashboard"
spec:
  type: LoadBalancer
  selector:
    app: gpu-pruner
  ports:
    - name: dashboard
      protocol: TCP
      port: 8080
      targetPort: 8080

kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gpu-pruner-cr
rules:
  - verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
    apiGroups:
      - ''
    resources:
      - pods
      - events
  - verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
    apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
      - statefulsets
      # scale-down patches the /scale subresource, which RBAC treats as a
      # distinct resource from the parent. Without these the pruner 403s in
      # scale-down mode (it works in dry-run because it never patches).
      - deployments/scale
      - replicasets/scale
      - statefulsets/scale
  - verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
    apiGroups:
      - kubeflow.org
    resources:
      - notebooks
  - verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
    apiGroups:
      - inferenceservices

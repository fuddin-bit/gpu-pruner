# CoreWeave LoadBalancer for Slack interactive callbacks (replaces OpenShift Route).
# external-hostname is rewritten by apply-user-namespace.sh to include the namespace.
apiVersion: v1
kind: Service
metadata:
  name: gpu-pruner-slack
  namespace: gpu-pruner-system
  labels:
    app: gpu-pruner
  annotations:
    service.beta.kubernetes.io/coreweave-load-balancer-type: "public"
    service.beta.kubernetes.io/external-hostname: "gpu-pruner-slack"
spec:
  type: LoadBalancer
  selector:
    app: gpu-pruner
  ports:
    - name: slack-interact
      protocol: TCP
      port: 3002
      targetPort: 3002
